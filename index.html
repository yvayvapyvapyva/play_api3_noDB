<style>
:root{--bg:#050505;--btn-txt:#fff;--target-lime:#0f0;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);--btn-size:56px;--glass-bg:rgba(30,30,35,0.55);--glass-bg-heavy:rgba(30,30,35,0.65);--glass-border:rgba(255,255,255,0.22);--glass-border-light:rgba(255,255,255,0.15);--glass-blur:50px;--glass-blur-heavy:70px;--glass-shadow:0 8px 32px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.15);--glass-shadow-heavy:0 16px 48px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,255,0.15);--glass-radius:22px;--glass-radius-sm:16px;--glass-radius-xs:14px}

.circle-btn{position:absolute;z-index:9005;background:var(--glass-bg);backdrop-filter:var(--glass-blur) saturate(180%);-webkit-backdrop-filter:var(--glass-blur) saturate(180%);width:var(--btn-size);height:var(--btn-size);border-radius:50%;border:1px solid var(--glass-border);color:#fff;cursor:pointer;transition:transform .15s,background .15s,border-color .15s;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:var(--glass-shadow)}
.circle-btn svg{fill:#fff;width:24px;height:24px;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.4))}
.circle-btn span{font-size:14px;font-weight:800;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,0.5)}
.circle-btn:active{transform:scale(.93);background:var(--glass-bg-heavy)}
.circle-btn.active{background:rgba(52,199,89,0.35);border-color:rgba(52,199,89,0.55);box-shadow:var(--glass-shadow),0 0 20px rgba(52,199,89,0.2)}
#menuBtn{top:calc(16px + var(--safe-top));left:16px}

#hud{position:absolute;bottom:calc(24px + var(--safe-bottom));left:16px;right:16px;z-index:9000;background:var(--glass-bg-heavy);backdrop-filter:var(--glass-blur-heavy) saturate(200%);-webkit-backdrop-filter:var(--glass-blur-heavy) saturate(200%);border-radius:var(--glass-radius);padding:16px;color:#fff;border:1px solid var(--glass-border);box-shadow:var(--glass-shadow-heavy);display:none;flex-direction:column;gap:10px;pointer-events:auto;width:calc(100% - 32px);box-sizing:border-box}

.hud-cmd{font-size:17px;font-weight:800;flex:1;text-shadow:0 1px 4px rgba(0,0,0,0.5);letter-spacing:-0.2px}
.hud-header .action-icon-btn{width:40px;height:40px;border-radius:var(--glass-radius-xs);display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);cursor:pointer;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.2)}

#toast{position:fixed;top:calc(80px + var(--safe-top));left:50%;transform:translateX(-50%) translateY(-100px);background:rgba(40,40,45,0.8);backdrop-filter:var(--glass-blur) saturate(180%);-webkit-backdrop-filter:var(--glass-blur) saturate(180%);color:#fff;padding:14px 24px;border-radius:var(--glass-radius-sm);font-size:14px;z-index:9999;transition:.4s;opacity:0;border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);font-weight:700;max-width:80vw;white-space:pre-wrap;text-align:center;line-height:1.4;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,0.4)}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.success{background:rgba(52,199,89,0.75);border-color:rgba(52,199,89,0.35)}
#toast.error{background:rgba(255,59,48,0.75);border-color:rgba(255,59,48,0.35)}
#toast.info{background:rgba(40,40,45,0.8);border-color:var(--glass-border)}
#jsonModal{position:fixed;top:calc(16px + var(--safe-top));left:50%;transform:translateX(-50%) translateY(-100px);z-index:10000;display:flex;opacity:0;visibility:hidden;pointer-events:none;transition:transform .3s cubic-bezier(.2,.8,.2,1),opacity .3s cubic-bezier(.2,.8,.2,1),visibility 0s linear .3s;width:95%;max-width:95%;max-height:calc(100dvh - 32px - var(--safe-top) - var(--safe-bottom))}
#jsonModal.hidden{transform:translateX(-50%) translateY(-100px);opacity:0;visibility:hidden;pointer-events:none}
#jsonModal:not(.hidden){transform:translateX(-50%) translateY(0);opacity:1;visibility:visible;pointer-events:auto;transition:transform .3s cubic-bezier(.2,.8,.2,1),opacity .3s cubic-bezier(.2,.8,.2,1),visibility 0s linear 0s}
.modal-sheet{width:100%;max-height:calc(100dvh - 32px - var(--safe-top) - var(--safe-bottom));background:var(--glass-bg-heavy);backdrop-filter:var(--glass-blur-heavy) saturate(200%);-webkit-backdrop-filter:var(--glass-blur-heavy) saturate(200%);border:1px solid var(--glass-border);border-radius:var(--glass-radius);padding:20px;display:flex;flex-direction:column;gap:12px;box-shadow:var(--glass-shadow-heavy);overflow:hidden;will-change:backdrop-filter;transform:translateZ(0)}
.modal-title{font-size:17px;font-weight:800;text-align:center;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.4)}
.modal-input{width:100%;padding:14px;border-radius:var(--glass-radius-xs);border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;font-size:14px;font-family:inherit;box-sizing:border-box;outline:none;margin-top:16px;transition:border-color .15s}

.modal-buttons{display:flex;gap:8px;margin-top:16px}
.modal-btn{flex:1;padding:14px;border-radius:var(--glass-radius-xs);border:1px solid rgba(255,255,255,0.2);font-size:15px;font-weight:700;cursor:pointer;transition:transform .15s,background .15s;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
.modal-btn:active{transform:scale(.96)}
.modal-btn-green{background:rgba(52,199,89,0.3);border-color:rgba(52,199,89,0.45)}
.modal-btn-muted{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)}
.routes-list{margin-top:16px;flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding:4px;-webkit-overflow-scrolling:touch;touch-action:pan-y;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.3) transparent}

.route-item{display:flex;flex-direction:column;align-items:flex-start;padding:12px;border-radius:var(--glass-radius-xs);background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);cursor:pointer;transition:transform .15s,background .15s;text-align:left;width:100%;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.route-item:active{transform:scale(.97);background:rgba(52,199,89,0.25)}
.route-name{font-size:15px;font-weight:700;color:#fff;line-height:1.3;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
.route-id{font-size:11px;color:rgba(255,255,255,0.5);margin-top:4px;font-family:monospace}
</style>

<script>
const COLORS={Gold:{hex:'#FFD700'},Blue:{hex:'#007AFF'},Red:{hex:'#F33'},Fuchsia:{hex:'#AF52DE'},Orange:{hex:'#F90'},Purple:{hex:'#5856D6'},Cyan:{hex:'#5CF'},Brown:{hex:'#A2845E'},Lime:{hex:'#3C7'}};
const APP={map:null,navPoints:[],navCurrentIndex:0,navPreviewIndex:-1,navAudio:new Audio()};
window.APP=APP;
const $=id=>document.getElementById(id);
const toRad=deg=>deg*Math.PI/180;
const toDeg=rad=>rad*180/Math.PI;
function calcAzimuth(p1,p2){if(!p1||!p2)return 0;const[la1,lo1]=p1.map(toRad);const[la2,lo2]=p2.map(toRad);const y=Math.sin(lo2-lo1)*Math.cos(la2);const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(lo2-lo1);return Math.round((toDeg(Math.atan2(y,x))+360)%360);}
if(typeof vkBridge!=='undefined')vkBridge.send('VKWebAppInit');
let toastTimer=null;
function showToast(text,type='info',duration=2000){const el=$('toast');el.textContent=text;el.className=`toast ${type} show`;if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),duration);}
const ALL_AUDIO_COMMANDS=["На перекрестке повернем налево","На перекрестке едем прямо","На перекрестке повернем направо","На перекрестке выполним разворот","На круговом движении первый съезд","На круговом движении второй съезд","На круговом движении третий съезд","На круговом движении четвертый съезд","На круговом движении выполним разворот","На регулируемом перекрестке повернем налево","На регулируемом перекрестке едем прямо","На регулируемом перекрестке повернем направо","На регулируемом перекрестке выполним разворот","На нерегулируемом перекрестке повернем налево","На нерегулируемом перекрестке едем прямо","На нерегулируемом перекрестке повернем направо","На нерегулируемом перекрестке выполним разворот","Выполним разворот вне перекрестка","Выполним разворот в ближайшем разрешенном месте","Найдите место для разворота и развернитесь","Выполняем разгон до максимальной скорости","Набираем максимальную скорость на данном участке дороги","Разгоняемся до максимальной разрешенной скорости","По моей команде выполним остановку и начало движения на подъеме","Выполняем остановку и начало движения на подъеме","Поворачиваем направо","Поворачиваем налево","Далее повернем направо","Далее повернем налево","На светофоре повернем направо","На светофоре повернем налево","Поворачиваем направо к ленте","Поворачиваем направо на заправку","Едем в прямом направлении","Выполняем параллельную парковку и гараж","Выполняем разворот в ограниченном пространстве","Выполним разворот в ограниченном пространстве с использованием передачи заднего хода","Выполняем остановку параллельно краю проезжей части","Выполняем остановку в ближайшем разрешенном месте","Начинаем движение","Как будете готовы начинаем движение","Выполним разворот в ближайшем разрешенном месте","Найдите место для остановки и остановитесь","Остановитесь в ближайшем разрешенном месте"];
function getAudioPath(t){if(!t)return null;const n=t.normalize('NFC').toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-`~()]/g,"").trim().replace(/\s+/g,'_');return`audio/${encodeURIComponent(n)}.mp3`;}
function getAudioPathAlt(t){if(!t)return null;const n=t.normalize('NFD').toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-`~()]/g,"").trim().replace(/\s+/g,'_');return`audio/${encodeURIComponent(n)}.mp3`;}
async function playCommand(text){if(!text)return;APP.navAudio.pause();const paths=[getAudioPath(text),getAudioPathAlt(text)].filter((p,i,a)=>p&&a.indexOf(p)===i);for(const path of paths){if('caches' in window){try{const cache=await caches.open('route-audio-v1'),cached=await cache.match(path);if(cached){APP.navAudio.src=URL.createObjectURL(await cached.blob());APP.navAudio.play().catch(e=>{});return;}}catch(e){}}try{APP.navAudio.src=path;await APP.navAudio.play();return;}catch(e){}}APP.navAudio.src=paths[0];APP.navAudio.play().catch(e=>{});}
async function preloadAudio(){if(!('caches' in window))return;const cache=await caches.open('route-audio-v1');const allPaths=ALL_AUDIO_COMMANDS.flatMap(cmd=>[getAudioPath(cmd),getAudioPathAlt(cmd)]).filter(p=>p),uniquePaths=[...new Set(allPaths)];for(const path of uniquePaths){try{const res=await fetch(path);if(res.ok)await cache.put(path,res);}catch(e){}}}
function loadRouteFromJSON(data){processRouteData(data);}
function processRouteData(data){
clearRoute();startWakeLock();
if(!data||!Array.isArray(data))throw new Error('Неверный формат');
APP.navPoints=data.map((d,i)=>{const pts=d.pts||[];if(!pts||pts.length===0)return null;const ptsConverted=pts.map(p=>[p[1],p[0]]);return{id:d.id||(i+1),color:d.color,hex:COLORS[d.color]?.hex||'#007AFF',cmd:(d.cmd||d.comm||`Т${i+1}`).trim(),comm:d.comm||'',pts:ptsConverted,az:pts.length>=2?calcAzimuth(pts[0],pts[1]):0};}).filter(p=>p);
if(APP.navPoints.length===0)throw new Error('Маршрут пуст');
APP.navCurrentIndex=0;APP.navPreviewIndex=-1;
$('hud').classList.add('active');$('loading').classList.add('hidden');
renderRoutePoints();updateHud();
if(APP.navPoints.length>0&&APP.map)setTimeout(()=>{let minLat=Infinity,maxLat=-Infinity,minLng=Infinity,maxLng=-Infinity;APP.navPoints.forEach(p=>{if(p.pts?.length>0){const[lng,lat]=p.pts[0];minLat=Math.min(minLat,lat);maxLat=Math.max(maxLat,lat);minLng=Math.min(minLng,lng);maxLng=Math.max(maxLng,lng);}});if(minLat!==Infinity)APP.map.update({location:{center:[(minLng+maxLng)/2,(minLat+maxLat)/2],zoom:18}});if(typeof AutoRouteModule==='object')AutoRouteModule.start(25);},500);
preloadAudio();
}
function getNavIconSvg(col,txt,az,isEnd,isCurr=false,hasComm=false){const s=38,c=s/2,r=12;const ring=isCurr?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.5)';const ringW=isCurr?2.5:1.5;const txtCol=hasComm?'#E8567F':'#fff';const fs=hasComm?10:11;const fw=800;const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 ${s} ${s}"><defs><filter id="s" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.5)"/></filter><radialGradient id="g" cx="40%" cy="35%"><stop offset="0%" stop-color="rgba(255,255,255,0.25)"/><stop offset="100%" stop-color="rgba(0,0,0,0.15)"/></radialGradient></defs><g filter="url(#s)"><circle cx="${c}" cy="${c}" r="${r}" fill="${col}" stroke="${ring}" stroke-width="${ringW}"/><circle cx="${c}" cy="${c}" r="${r}" fill="url(#g)"/></g><text x="${c}" y="${c+0.5}" font-size="${fs}" font-family="-apple-system,sans-serif" font-weight="${fw}" text-anchor="middle" dominant-baseline="middle" fill="${txtCol}" stroke="rgba(0,0,0,0.3)" stroke-width="1.5" style="paint-order:stroke fill">${txt}</text></svg>`;return'data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));}

function clearRoute(){if(APP.map&&APP.navPoints)APP.navPoints.forEach(p=>{if(p.placemark)APP.map.removeChild(p.placemark);if(p.line)APP.map.removeChild(p.line);});APP.navPoints=[];APP.navCurrentIndex=0;APP.navPreviewIndex=-1;$('hud').classList.remove('active');if(typeof AutoRouteModule==='object')AutoRouteModule.stop();}

function goToPoint(i){if(i<0||i>=APP.navPoints.length)return;const wasRunning=typeof AutoRouteModule==='object'&&AutoRouteModule.isRunning;if(wasRunning){AutoRouteModule._stopRequested=true;AutoRouteModule.isRunning=false;window.isAutoRouteRunning=false;if(AutoRouteModule._segmentTimeoutId){clearTimeout(AutoRouteModule._segmentTimeoutId);AutoRouteModule._segmentTimeoutId=null;}if(AutoRouteModule._animationFrameId){cancelAnimationFrame(AutoRouteModule._animationFrameId);AutoRouteModule._animationFrameId=null;}AutoRouteModule.isTransition=false;AutoRouteModule.isFirstStart=false;AutoRouteModule.updateButtonState();hideAutoIndicator();}APP.navCurrentIndex=i;renderRoutePoints();updateHud();const p=APP.navPoints[i];if(p?.pts?.length>0){const nextAz=p.az||0;APP.map.update({location:{center:p.pts[0],zoom:18},camera:{azimuth:-nextAz*(Math.PI/180),tilt:50*(Math.PI/180)}});updateAutoIndicator(p.pts[0]);}if(wasRunning)setTimeout(()=>{AutoRouteModule._stopRequested=false;AutoRouteModule.currentIndex=i;AutoRouteModule.start(25);},100);}

const EARTH_RADIUS=6371000;
function _calcDistance(p1,p2){const[lon1,lat1]=p1.map(d=>d*Math.PI/180),[lon2,lat2]=p2.map(d=>d*Math.PI/180),dLat=lat2-lat1,dLon=lon2-lon1,a=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;return EARTH_RADIUS*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

let autoIndicatorMarker=null,autoIndicatorVisible=false,autoIndicatorEl=null;
function updateAutoIndicator(coords){if(!APP.map||!coords)return;if(!autoIndicatorMarker){const markerElement=document.createElement('div');markerElement.style.cssText='position:absolute;transform:translate(-50%,-50%);';const markerElementImg=document.createElement('img');markerElementImg.src='assets/images/marker-red.png';markerElementImg.style.cssText='width:40px;height:40px;display:block;';markerElement.appendChild(markerElementImg);autoIndicatorEl=markerElementImg;autoIndicatorMarker=new ymaps3.YMapMarker({coordinates:coords,zIndex:10000},markerElement);APP.map.addChild(autoIndicatorMarker);autoIndicatorVisible=true;return;}if(!autoIndicatorVisible){APP.map.addChild(autoIndicatorMarker);autoIndicatorVisible=true;}autoIndicatorMarker.update({coordinates:coords});}

function angleFromCoordinate(p1,p2){const toRad=d=>d*Math.PI/180;const toDeg=r=>r*180/Math.PI;const dLon=toRad(p2[0]-p1[0]);const y=Math.sin(dLon)*Math.cos(toRad(p2[1]));const x=Math.cos(toRad(p1[1]))*Math.sin(toRad(p2[1]))-Math.sin(toRad(p1[1]))*Math.cos(toRad(p2[1]))*Math.cos(dLon);return(Math.atan2(y,x)*180/Math.PI+360)%360;}
const AutoRouteModule={currentIndex:0,speed:25,isRunning:false,btn:null,isTransition:false,isFirstStart:false,_animationFrameId:null,_segmentTimeoutId:null,_stopRequested:false,

animateAlongPath(pts,speed=25,onComplete=null,minDuration=3500,applySlowStart=true){if(this._stopRequested){if(onComplete)onComplete();return;}if(!pts||pts.length<2){if(onComplete)onComplete();return;}const validPts=pts.filter(p=>p&&p.length===2);if(validPts.length<2){if(onComplete)onComplete();return;}try{const segLengths=[];let totalLength=0;for(let i=0;i<validPts.length-1;i++){const len=_calcDistance(validPts[i],validPts[i+1]);segLengths.push(len);totalLength+=len;}if(totalLength===0){if(onComplete)onComplete();return;}const slowSpeed=6.94,fastSpeed=speed,slowDuration=applySlowStart?3000:0,slowDistance=applySlowStart?slowSpeed*3:0;let totalDuration;if(applySlowStart&&totalLength<=slowDistance)totalDuration=(totalLength/slowSpeed)*1000;else if(applySlowStart){const fastDistance=totalLength-slowDistance;totalDuration=slowDuration+(fastDistance/fastSpeed)*1000;}else totalDuration=(totalLength/fastSpeed)*1000;if(minDuration>0&&totalDuration<minDuration)totalDuration=minDuration;const startTime=performance.now();const animateStep=(currentTime)=>{if(this._stopRequested){cancelAnimationFrame(this._animationFrameId);this._animationFrameId=null;if(onComplete)onComplete();return;}const elapsed=currentTime-startTime;let currentDistance=elapsed<=slowDuration?slowSpeed*(elapsed/1000):slowDistance+fastSpeed*((elapsed-slowDuration)/1000);currentDistance=Math.min(currentDistance,totalLength);const currentPoint=getPointAlongLine(createLineString(validPts),currentDistance);if(currentPoint?.geometry?.coordinates?.length===2)updateAutoIndicator(currentPoint.geometry.coordinates);if(currentDistance<totalLength){this._animationFrameId=requestAnimationFrame(animateStep);}};this._animationFrameId=requestAnimationFrame(animateStep);let currentSegIndex=0,segDistanceAtStart=0;const animateSegment=()=>{if(this._stopRequested||currentSegIndex>=validPts.length-1){if(this._segmentTimeoutId){clearTimeout(this._segmentTimeoutId);this._segmentTimeoutId=null;}if(this._animationFrameId){cancelAnimationFrame(this._animationFrameId);this._animationFrameId=null;}if(onComplete)onComplete();return;}const p1=validPts[currentSegIndex],p2=validPts[currentSegIndex+1],segLength=segLengths[currentSegIndex],distAtSegEnd=segDistanceAtStart+segLength;let timeAtSegStart=segDistanceAtStart<=slowDistance?(segDistanceAtStart/slowSpeed)*1000:slowDuration+((segDistanceAtStart-slowDistance)/fastSpeed)*1000,timeAtSegEnd=distAtSegEnd<=slowDistance?(distAtSegEnd/slowSpeed)*1000:slowDuration+((distAtSegEnd-slowDistance)/fastSpeed)*1000,segDuration=timeAtSegEnd-timeAtSegStart;const segAngle=angleFromCoordinate(p1,p2),targetAzimuth=-segAngle,currentMapAzimuth=(APP.map.azimuth||0)*(180/Math.PI);let azimuthDiff=targetAzimuth-currentMapAzimuth;if(azimuthDiff>180)azimuthDiff-=360;if(azimuthDiff<-180)azimuthDiff+=360;APP.map.update({location:{center:p2,duration:segDuration,easing:'linear'},camera:{azimuth:(currentMapAzimuth+azimuthDiff)*(Math.PI/180),duration:segDuration}});segDistanceAtStart=distAtSegEnd;currentSegIndex++;this._segmentTimeoutId=setTimeout(animateSegment,segDuration);};animateSegment();}catch(e){if(onComplete)onComplete();}},
playSegment(){if(this._stopRequested)return;const appRef=APP;if(!this.isRunning||this.currentIndex>=appRef.navPoints.length){this.stop();showToast('Маршрут завершён!','success');return;}const p=appRef.navPoints[this.currentIndex];if(!p||!p.pts||p.pts.length<2){this.currentIndex++;this.playSegment();return;}if(this.currentIndex>0&&!this.isTransition&&!this.isFirstStart){const prevPoint=appRef.navPoints[this.currentIndex-1].pts[appRef.navPoints[this.currentIndex-1].pts.length-1],currentStart=p.pts[0],gap=_calcDistance(prevPoint,currentStart);if(gap>5){this.isTransition=true;const transitionPts=[],segments=Math.ceil(gap/10);for(let i=0;i<=segments;i++){const t=i/segments;transitionPts.push([prevPoint[0]+(currentStart[0]-prevPoint[0])*t,prevPoint[1]+(currentStart[1]-prevPoint[1])*t]);}this.animateAlongPath(transitionPts,this.speed,()=>{if(this._stopRequested)return;this.isTransition=false;appRef.navCurrentIndex=this.currentIndex;updateHud();renderRoutePoints();if(p.cmd)playCommand(p.cmd);this.animateAlongPath(p.pts,this.speed,()=>{if(this._stopRequested)return;this.currentIndex++;this.playSegment();},3500,true);},0,false);return;}}this.isFirstStart=false;appRef.navCurrentIndex=this.currentIndex;updateHud();renderRoutePoints();if(p.cmd)playCommand(p.cmd);this.animateAlongPath(p.pts,this.speed,()=>{if(this._stopRequested)return;this.currentIndex++;this.playSegment();},3500,true);}};
async function initMap(){
